<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIDEB - متابعة الرحلة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
overflow:hidden;
}


/* الخريطة */

#map{

position:absolute;
top:0;
left:0;

width:100%;

height:60vh;

z-index:1;

}



/* البطاقة */

.card{

position:absolute;

bottom:0;

left:0;

width:100%;

background:white;

border-radius:35px 35px 0 0;

padding:25px;

z-index:10;

box-shadow:0 -5px 25px #0003;

}



/* الشعار */

.logo{

font-size:36px;

font-weight:bold;

color:#1565c0;

}



/* الحالة */

.status{

background:#eef5ff;

padding:15px;

border-radius:15px;

margin:15px 0;

font-size:20px;

font-weight:bold;

color:#1565c0;

}



/* المعلومات */

.info{

background:#f8fafc;

padding:15px;

border-radius:18px;

margin-top:10px;

font-size:18px;

}



</style>

</head>


<body>


<div id="map"></div>



<div class="card">


<div class="logo">

🚗 RIDEB

</div>



<div class="status" id="status">

🟡 جاري تحميل الرحلة

</div>




<div class="info">

👤 الكابتن

<br>

<span id="name">-</span>

</div>



<div class="info">

🚘 السيارة

<br>

<span id="car">-</span>

</div>



<div class="info">

📞 الهاتف

<br>

<span id="phone">-</span>

</div>



</div>





<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


let map = L.map('map').setView(
[31.9539,35.9106],
13
);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);



let captainMarker;



function checkRide(){


fetch("https://ridex-kdj1.onrender.com/ride")

.then(res=>res.json())

.then(data=>{


let c=data.captain || {};



document.getElementById("name").innerHTML =
c.name || "-";


document.getElementById("car").innerHTML =
c.car || "-";


document.getElementById("phone").innerHTML =
c.phone || "-";



let status =
document.getElementById("status");



if(data.status==="accepted"){

status.innerHTML =
"🚗 الكابتن في الطريق إليك";

}


else if(data.status==="started"){

status.innerHTML =
"🛣️ الرحلة بدأت";

}


else if(data.status==="finished"){

status.innerHTML =
"✅ وصلت إلى وجهتك";

}





if(data.captain_location){


let lat=data.captain_location.lat;

let lng=data.captain_location.lng;



if(lat && lng){


if(captainMarker){


captainMarker.setLatLng(
[lat,lng]
);



}else{


captainMarker=L.marker(
[lat,lng]
)

.addTo(map)

.bindPopup("🚗 الكابتن");


}



map.setView(
[lat,lng],
15
);


}


}



});


}



setInterval(checkRide,1000);


checkRide();


</script>


</body>

</html>
