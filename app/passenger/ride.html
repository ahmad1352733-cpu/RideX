<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>RideX - طلب رحلة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>

body{
margin:0;
font-family:Arial;
background:#0066cc;
text-align:center;
padding:30px;
}

.card{
background:white;
border-radius:20px;
padding:30px;
}

h1{
font-size:40px;
}

input{
width:90%;
padding:18px;
margin:10px;
font-size:22px;
border-radius:12px;
border:1px solid #ccc;
}

button{
width:90%;
padding:20px;
margin-top:20px;
font-size:24px;
border:none;
border-radius:15px;
background:#0066cc;
color:white;
}

#status{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#0066cc;
}

#map{
height:350px;
border-radius:20px;
margin-top:20px;
}

</style>

</head>


<body>


<div class="card">


<h1>🚗 RideX</h1>


<div id="map"></div>


<input id="from" placeholder="📍 مكان الانطلاق">


<input id="to" placeholder="🏁 الوجهة">


<button onclick="sendRide()">
تأكيد الطلب
</button>


<div id="status"></div>


</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>


let waiting=false;


let userMarker;



let map=L.map('map').setView(
[31.9539,35.9106],
13
);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);






function sendPassengerLocation(){


navigator.geolocation.getCurrentPosition(

function(position){


let lat=position.coords.latitude;

let lng=position.coords.longitude;



fetch("https://ridex-kdj1.onrender.com/location",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

lat:lat,

lng:lng

})

});




if(userMarker){

userMarker.setLatLng(
[lat,lng]
);


}else{


userMarker=L.marker(
[lat,lng]
)
.addTo(map)
.bindPopup("📍 موقعك");


}


map.setView(
[lat,lng],
15
);



if(document.getElementById("from").value===""){

document.getElementById("from").value =
lat+","+lng;

}



}

);


}







function sendRide(){


let from=document.getElementById("from").value.trim();

let to=document.getElementById("to").value.trim();



if(from==="" || to===""){


document.getElementById("status").innerHTML=
"⚠️ أدخل الانطلاق والوجهة";


return;


}




fetch("https://ridex-kdj1.onrender.com/request",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

from:from,

to:to

})

})


.then(()=>{


waiting=true;


document.getElementById("status").innerHTML=
"🟡 جاري البحث عن كابتن...";


});


}








function checkRide(){


if(!waiting)return;



fetch("https://ridex-kdj1.onrender.com/ride")

.then(res=>res.json())

.then(data=>{


if(data.status==="accepted"){


window.location.href="driver.html";


}


});


}







setInterval(sendPassengerLocation,3000);

setInterval(checkRide,1000);



sendPassengerLocation();



</script>


</body>

</html>
