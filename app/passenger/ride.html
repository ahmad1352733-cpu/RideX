<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIDEB - طلب رحلة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
height:100vh;
overflow:hidden;
}


/* الخريطة */

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
z-index:1;
}


/* البطاقة السفلية */

.card{

position:absolute;
bottom:0;
left:0;
width:100%;
background:white;
border-radius:35px 35px 0 0;
padding:25px;
z-index:10;
box-shadow:0 -5px 25px #0003;

}


/* الشعار */

.logo{

font-size:36px;
font-weight:bold;
color:#1565c0;

}

.slogan{

color:#777;
margin-bottom:20px;

}


/* الحقول */

input{

width:100%;
padding:16px;
margin:8px 0;

font-size:18px;

border-radius:15px;
border:1px solid #ddd;

background:#f8fafc;

}


/* الزر */

button{

width:100%;

padding:18px;

margin-top:15px;

border:none;

border-radius:18px;

background:#1565c0;

color:white;

font-size:22px;

font-weight:bold;

}


button:active{

transform:scale(.97);

}


/* الحالة */

#status{

margin-top:15px;

padding:12px;

border-radius:15px;

background:#eef5ff;

color:#1565c0;

font-size:18px;

font-weight:bold;

}


</style>

</head>


<body>


<div id="map"></div>


<div class="card">


<div class="logo">
🚗 RIDEB
</div>


<div class="slogan">
اركب بذكاء
</div>



<input id="from" placeholder="📍 مكان الانطلاق">


<input id="to" placeholder="🏁 إلى أين؟">



<button onclick="sendRide()">

🚕 اطلب رحلة

</button>



<div id="status">
جاهز لطلب رحلة
</div>


</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let waiting = false;
let userMarker;


let map = L.map('map').setView(
[31.9539,35.9106],
13
);


L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);



function sendPassengerLocation(){

navigator.geolocation.getCurrentPosition(

function(position){

let lat = position.coords.latitude;
let lng = position.coords.longitude;


fetch("https://ridex-kdj1.onrender.com/location",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
lat:lat,
lng:lng
})
});



if(userMarker){

userMarker.setLatLng([lat,lng]);

}else{

userMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("📍 موقعك");

}


map.setView([lat,lng],15);



if(document.getElementById("from").value===""){

document.getElementById("from").value =
lat+","+lng;

}


}

);

}




function sendRide(){

let from =
document.getElementById("from").value.trim();

let to =
document.getElementById("to").value.trim();



if(from==="" || to===""){

document.getElementById("status").innerHTML =
"⚠️ أدخل مكان الانطلاق والوجهة";

return;

}



fetch("https://ridex-kdj1.onrender.com/request",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

from:from,
to:to,

passenger_name: localStorage.getItem("passengerName") || "",

passenger_phone: localStorage.getItem("passengerPhone") || ""

})

})


.then(()=>{

waiting=true;

document.getElementById("status").innerHTML =
"🟡 جاري البحث عن كابتن...";

});


}




function checkRide(){

if(!waiting)return;


fetch("https://ridex-kdj1.onrender.com/ride")

.then(res=>res.json())

.then(data=>{


if(data.status==="accepted"){

window.location.href="driver.html";

}


});


}



setInterval(sendPassengerLocation,3000);

setInterval(checkRide,1000);


sendPassengerLocation();


</script>


</body>
</html>
