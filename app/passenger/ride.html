<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIDEB - طلب رحلة</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f7fb;
height:100vh;
overflow:hidden;
}


/* الخريطة */

#map{
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
z-index:1;
}


/* البطاقة السفلية */

.card{

position:absolute;
bottom:0;
left:0;
width:100%;
background:white;
border-radius:35px 35px 0 0;
padding:25px;
z-index:10;
box-shadow:0 -5px 25px #0003;

}


/* الشعار */

.logo{

font-size:36px;
font-weight:bold;
color:#1565c0;

}

.slogan{

color:#777;
margin-bottom:20px;

}


/* الحقول */

input{

width:100%;
padding:16px;
margin:8px 0;

font-size:18px;

border-radius:15px;
border:1px solid #ddd;

background:#f8fafc;

}


/* الزر */

button{

width:100%;

padding:18px;

margin-top:15px;

border:none;

border-radius:18px;

background:#1565c0;

color:white;

font-size:22px;

font-weight:bold;

}


button:active{

transform:scale(.97);

}


/* الحالة */

#status{

margin-top:15px;

padding:12px;

border-radius:15px;

background:#eef5ff;

color:#1565c0;

font-size:18px;

font-weight:bold;

}


</style>

</head>


<body>


<div id="map"></div>


<div class="card">


<div class="logo">
🚗 RIDEB
</div>


<div class="slogan">
اركب بذكاء
</div>



<input id="from" placeholder="📍 مكان الانطلاق">


<input id="to" placeholder="🏁 إلى أين؟">



<button onclick="sendRide()">

🚕 اطلب رحلة

</button>



<div id="status">
جاهز لطلب رحلة
</div>


</div>



<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
