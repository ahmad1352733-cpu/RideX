<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIDEB</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f7fb;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:90%;
max-width:420px;
background:white;
border-radius:30px;
padding:35px 25px;
text-align:center;
box-shadow:0 10px 30px #0002;
}

.logo{
font-size:45px;
font-weight:bold;
color:#1565c0;
margin-bottom:10px;
}

.slogan{
color:#666;
font-size:20px;
margin-bottom:40px;
}

.car{
font-size:80px;
margin:20px;
}

button{

width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#1565c0;
color:white;
font-size:24px;
font-weight:bold;
cursor:pointer;

}

button:active{
transform:scale(.97);
}

</style>

</head>


<body>


<div class="card">

<div class="logo">
🚗 RIDEB
</div>

<div class="slogan">
اركب بذكاء
</div>


<div class="car">
🚘
</div>


<button onclick="window.location='ride.html'">
اطلب رحلة
</button>


</div>


</body>

</html>
