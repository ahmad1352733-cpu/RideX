<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>RideX Captain Register</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0066cc;
text-align:center;
padding:30px;
}

.card{
background:white;
border-radius:20px;
padding:30px;
}

input{
width:90%;
padding:18px;
margin:10px;
font-size:22px;
border-radius:12px;
border:1px solid #ccc;
}

button{
width:90%;
padding:20px;
font-size:25px;
border:none;
border-radius:15px;
background:#0066cc;
color:white;
}

#msg{
font-size:22px;
margin-top:20px;
}

</style>

</head>


<body>


<div class="card">


<h1>🚗 RideX</h1>

<h2>تسجيل كابتن</h2>


<input id="name" placeholder="اسم الكابتن">

<input id="car" placeholder="نوع السيارة">

<input id="plate" placeholder="رقم اللوحة">

<input id="phone" placeholder="رقم الهاتف">

<input id="password" type="password" placeholder="كلمة المرور">


<button onclick="saveCaptain()">
تسجيل
</button>


<h3 id="msg"></h3>


</div>



<script>


function saveCaptain(){


let name =
document.getElementById("name").value.trim();


let car =
document.getElementById("car").value.trim();


let plate =
document.getElementById("plate").value.trim();


let phone =
document.getElementById("phone").value.trim();


let password =
document.getElementById("password").value.trim();



if(
name=="" ||
car=="" ||
plate=="" ||
phone=="" ||
password==""
){

document.getElementById("msg").innerHTML =
"⚠️ أكمل جميع البيانات";

return;

}




fetch("http://127.0.0.1:9000/register_captain",
{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

name:name,

car:car,

plate:plate,

phone:phone,

password:password

})

})


.then(()=>{


localStorage.setItem("captainName",name);

localStorage.setItem("captainCar",car);

localStorage.setItem("captainPlate",plate);

localStorage.setItem("captainPhone",phone);


document.getElementById("msg").innerHTML =
"✅ تم حفظ الكابتن";


})


.catch(()=>{


document.getElementById("msg").innerHTML =
"❌ خطأ في الاتصال بالسيرفر";


});


}


</script>


</body>

</html>
