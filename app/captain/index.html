<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIDEB Captain</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
overflow:hidden;
background:#f5f7fb;
}


/* الخريطة */

#map{

position:absolute;

top:0;
left:0;

width:100%;

height:100vh;

z-index:1;

}



/* المربع السفلي */

.panel{

position:absolute;

bottom:0;

left:0;

width:100%;

background:white;

border-radius:35px 35px 0 0;

padding:25px;

z-index:10;

box-shadow:0 -5px 25px #0003;

max-height:45vh;

overflow:auto;

}



.logo{

font-size:32px;

font-weight:bold;

color:#1565c0;

}



.status{

margin-top:15px;

padding:15px;

border-radius:20px;

background:#eef5ff;

font-size:20px;

font-weight:bold;

}



button{

width:100%;

padding:16px;

margin-top:12px;

border:0;

border-radius:18px;

font-size:20px;

font-weight:bold;

background:#1565c0;

color:white;

}



.ride{

background:#f1f5f9;

border-radius:20px;

padding:15px;

margin-top:15px;

font-size:18px;

}


</style>

</head>


<body>


<div id="map"></div>



<div class="panel">


<div class="logo">

🚗 RIDEB Captain

</div>


<div class="status" id="onlineStatus">

🟢 متاح

</div>


<button onclick="toggleStatus()" id="statusBtn">

تغيير الحالة

</button>



<h3 id="title">

الرحلات المتاحة

</h3>



<div id="rides">

جاري البحث...

</div>


</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>


let currentRide=null;

let available=true;



let map=L.map('map').setView(
[31.9539,35.9106],
13
);



L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);



let captainMarker;




function toggleStatus(){


available=!available;



let box=document.getElementById("onlineStatus");


if(available){

box.innerHTML="🟢 متاح";

}else{

box.innerHTML="⚪ غير متاح";

}


}




function sendCaptainLocation(){


if(!available)return;



navigator.geolocation.getCurrentPosition(

function(position){


let lat=position.coords.latitude;

let lng=position.coords.longitude;



fetch("https://ridex-kdj1.onrender.com/captain_location",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

lat:lat,

lng:lng,

phone:
localStorage.getItem("captainPhone") || "000"

})

});



if(captainMarker){

captainMarker.setLatLng([lat,lng]);

}else{

captainMarker=L.marker([lat,lng])

.addTo(map)

.bindPopup("🚗 أنت");

}


map.setView([lat,lng],15);


}

);


}







function loadRides(){


if(currentRide || !available)return;



fetch("https://ridex-kdj1.onrender.com/rides")

.then(res=>res.json())

.then(data=>{


let box=document.getElementById("rides");

box.innerHTML="";



if(data.length==0){

box.innerHTML="لا توجد رحلات حاليا";

return;

}



data.forEach(r=>{


box.innerHTML+=`

<div class="ride">

🚗 رحلة رقم ${r[0]}

<br><br>

📍 من:
<br>
${r[3]}

<br><br>

🏁 إلى:
<br>
${r[4]}


<button onclick="acceptRide(${r[0]})">

✅ قبول

</button>


</div>

`;

});


});


}






function acceptRide(id){


currentRide=id;



fetch("https://ridex-kdj1.onrender.com/accept",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ride_id:id,

phone:
localStorage.getItem("captainPhone") || "000"

})

});



document.getElementById("title").innerHTML=
"رحلتي الحالية";


document.getElementById("rides").innerHTML=`

<div class="ride">

🚗 الرحلة رقم ${id}


<button onclick="startRide()">

▶️ بدء الرحلة

</button>


<button onclick="finishRide()">

🏁 إنهاء الرحلة

</button>


</div>

`;



}







function startRide(){


fetch("https://ridex-kdj1.onrender.com/start",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ride_id:currentRide

})

});


alert("بدأت الرحلة");


}




function finishRide(){


fetch("https://ridex-kdj1.onrender.com/finish",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ride_id:currentRide

})

});


alert("انتهت الرحلة");


currentRide=null;

loadRides();


}





setInterval(loadRides,3000);

setInterval(sendCaptainLocation,3000);


loadRides();

sendCaptainLocation();



</script>


</body>

</html>
