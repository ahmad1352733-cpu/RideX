<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<link rel="manifest" href="/RideX/manifest.json">
<meta name="theme-color" content="#1565C0">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RIDEB Captain</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
height:100vh;
overflow:hidden;
}


/* الخريطة */

#map{

position:absolute;
top:0;
left:0;

width:100%;
height:100vh;

z-index:1;

}


/* الصندوق السفلي */

.card{

position:absolute;

bottom:0;
left:0;

width:100%;

background:white;

border-radius:35px 35px 0 0;

padding:25px;

z-index:10;

box-shadow:0 -5px 25px #0003;

}


.logo{

font-size:32px;
font-weight:bold;
color:#1565c0;

}


.status{

margin-top:15px;

padding:15px;

border-radius:18px;

background:#eef5ff;

font-size:20px;

font-weight:bold;

}


button{

width:100%;

padding:17px;

margin-top:12px;

border:0;

border-radius:18px;

background:#1565c0;

color:white;

font-size:20px;

font-weight:bold;

}


.ride{

background:#f1f5f9;

border-radius:20px;

padding:15px;

margin-top:15px;

font-size:18px;

}

</style>

</head>


<body>


<div id="map"></div>


<div class="card">


<div class="logo">
🚗 RIDEB Captain
</div>


<div class="status" id="onlineStatus">
🟢 متاح
</div>


<button onclick="toggleStatus()">
تغيير الحالة
</button>


<h3>
الرحلات
</h3>


<div id="rides">
جاري البحث...
</div>


</div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


<script>

let available=true;
let currentRide=null;
let marker=null;


let map=L.map('map').setView(
[31.9539,35.9106],
13
);


L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map);



function toggleStatus(){

available=!available;

document.getElementById("onlineStatus").innerHTML =
available ? "🟢 متاح" : "⚪ غير متاح";

}



function sendLocation(){

if(!available)
return;


navigator.geolocation.getCurrentPosition(

p=>{


let lat=p.coords.latitude;
let lng=p.coords.longitude;


fetch(
"https://ridex-kdj1.onrender.com/captain_location",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

lat:lat,
lng:lng,

phone:
localStorage.getItem("captainPhone") || "000"

})

}
);



if(marker){

marker.setLatLng([lat,lng]);

}else{

marker=L.marker([lat,lng])
.addTo(map)
.bindPopup("🚗 أنت");

map.setView([lat,lng],15);

}


});


}



function loadRides(){


if(currentRide)
return;


fetch(
"https://ridex-kdj1.onrender.com/rides"
)

.then(r=>r.json())

.then(data=>{


let box=document.getElementById("rides");

box.innerHTML="";


if(data.length==0){

box.innerHTML="لا توجد رحلات";

return;

}



data.forEach(r=>{


box.innerHTML+=`

<div class="ride">

🚕 رحلة رقم ${r[0]}

<br><br>

📍 ${r[3]}

<br>

🏁 ${r[4]}


<button onclick="acceptRide(${r[0]})">

قبول الرحلة

</button>


</div>

`;

});


});


}



function acceptRide(id){


currentRide=id;


fetch(
"https://ridex-kdj1.onrender.com/accept",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ride_id:id,

phone:
localStorage.getItem("captainPhone") || "000"

})

}
);


document.getElementById("rides").innerHTML=

`

<div class="ride">

✅ تم قبول الرحلة

<br><br>

رقم الرحلة: ${id}


<button onclick="startRide()">
بدء الرحلة
</button>


<button onclick="finishRide()">
إنهاء الرحلة
</button>


</div>

`;

}



function startRide(){

navigator.geolocation.getCurrentPosition(function(position){

fetch(
"https://ridex-kdj1.onrender.com/start",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ride_id:currentRide,
lat:position.coords.latitude,
lng:position.coords.longitude

})

}
);

});

}



function finishRide(){


navigator.geolocation.getCurrentPosition(function(position){

fetch(
"https://ridex-kdj1.onrender.com/finish",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

ride_id:currentRide,
lat:position.coords.latitude,
lng:position.coords.longitude

})

}
);

});


currentRide=null;

loadRides();

}



setInterval(loadRides,3000);

setInterval(sendLocation,10000);


loadRides();

sendLocation();


</script>


</body>

</html>
